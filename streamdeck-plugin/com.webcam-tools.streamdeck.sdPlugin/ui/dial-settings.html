<!DOCTYPE html>
<html>

<head lang="en">
    <title>Camera Dial Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <!--
        Per-dial setting (not global) -- each of the 4 dials on a Stream Deck+
        can be bound to a different control.
    -->
    <sdpi-item label="Control">
        <sdpi-select setting="control" default="exposure">
            <option value="exposure">Exposure (hardware)</option>
            <option value="hw_brightness">Brightness (hardware)</option>
            <option value="brightness">Brightness (post-processing)</option>
            <option value="contrast">Contrast (post-processing)</option>
            <option value="saturation">Saturation (post-processing)</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="">
        <span style="opacity: 0.7; font-size: 12px;">
            Rotate to adjust, press to reset to a sane default. Turning the
            Exposure dial also switches that camera out of auto-exposure.
            Server URL is configured on the other Webcam Tools actions
            (it's shared).
        </span>
    </sdpi-item>
</body>

</html>
